<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pose Analyzer</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        
        .loader {
            border: 4px solid #334155;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8">
    <!-- Header -->
    <div class="text-center mb-6">
        <h1 class="text-4xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
            Docker-Pose-Analyzer
        </h1>
        <p class="text-gray-400 text-md">사진 기반 전신 자세 및 체형 불균형 분석 시스템</p>
    </div>

    <!-- Mode Selectors -->
    <div class="flex gap-4 mb-6">
        <button id="btn-front" onclick="setMode('front')" 
                class="px-6 py-3 rounded-lg font-bold bg-blue-600 hover:bg-blue-500 text-white transition-all shadow-lg focus:ring-4 focus:ring-blue-300">
            정면 대칭 분석 (Frontal)
        </button>
        <button id="btn-side" onclick="setMode('side')" 
                class="px-6 py-3 rounded-lg font-bold bg-purple-600 hover:bg-purple-500 text-white transition-all shadow-lg focus:ring-4 focus:ring-purple-300">
            측면 체형 분석 (Side)
        </button>
    </div>

    <!-- Status Label -->
    <div class="mb-6 text-sm text-gray-400 bg-gray-800/50 px-5 py-2 rounded-full border border-gray-700">
        현재 분석 모드: <span id="current-mode-label" class="font-bold text-blue-400 uppercase tracking-widest">{{ mode }}</span>
    </div>

    <div class="flex w-full max-w-6xl gap-6 px-4">
        
        <!-- Left Sidebar: Server Images & Upload -->
        <div class="w-1/3 bg-gray-800 p-5 rounded-2xl border border-gray-700 flex flex-col shadow-xl">
            <h2 class="text-lg font-bold mb-4 text-white border-b border-gray-700 pb-2 flex justify-between items-center">
                <span>사진 선택</span>
            </h2>
            
            <!-- Upload Button -->
            <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
            <button onclick="document.getElementById('image-upload').click()" class="w-full mb-6 px-4 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl text-sm font-bold transition shadow border border-slate-600">
                ➕ 내 PC에서 파일 업로드
            </button>

            <div class="flex justify-between items-center mb-3">
                <span class="text-sm text-gray-400 font-semibold">📁 data/images 폴더 내 파일</span>
                <button onclick="fetchImageList()" class="text-xs bg-gray-700 hover:bg-gray-600 text-gray-200 px-3 py-1.5 rounded-lg transition border border-gray-600">
                    🔄 새로고침
                </button>
            </div>
            
            <!-- Image List from Server -->
            <div id="server-image-list" class="flex flex-col gap-2 overflow-y-auto max-h-[400px] pr-2">
                <div class="text-sm text-gray-500 italic p-3 text-center border border-dashed border-gray-600 rounded">이미지를 불러오는 중...</div>
            </div>
        </div>

        <!-- Right Main: Image Display -->
        <div class="w-2/3 bg-gray-800 rounded-2xl p-6 border border-gray-700 flex flex-col justify-center items-center min-h-[500px] relative shadow-xl">
            
            <img id="result-image" class="rounded-xl w-full h-auto object-contain max-h-[600px] shadow-inner hidden" alt="Analyzed Result">
            
            <div id="loading-spinner" class="loader hidden absolute"></div>

            <div id="placeholder-text" class="text-gray-500 text-lg text-center">
                좌측 목록에서 사진을 선택하거나 새로 업로드해 주세요.<br><br>
                <span class="text-sm text-gray-400 bg-gray-900 px-3 py-1 rounded-full">💡 분석이 완료된 이미지는 <strong>outputs/</strong> 폴더에 자동 저장됩니다!</span>
            </div>
        </div>

    </div>

    <script>
        let currentFile = null;      // File object from upload
        let currentServerFile = null; // Filename from server
        let currentMode = "{{ mode }}";

        // 초기화 시 서버 이미지 목록 불러오기
        document.addEventListener("DOMContentLoaded", () => {
            fetchImageList();
        });

        function fetchImageList() {
            fetch('/list_images')
                .then(res => res.json())
                .then(data => {
                    const listContainer = document.getElementById('server-image-list');
                    listContainer.innerHTML = '';
                    
                    if (data.images.length === 0) {
                        listContainer.innerHTML = '<div class="text-sm text-gray-500 italic p-3 text-center border border-dashed border-gray-700 rounded bg-gray-900/50">data/images 폴더에<br>이미지 파일이 없습니다.</div>';
                        return;
                    }
                    
                    data.images.forEach(filename => {
                        const btn = document.createElement('button');
                        // 현재 선택된 파일인 경우 하이라이트
                        const isSelected = (filename === currentServerFile);
                        const baseClass = "text-left w-full px-4 py-3 text-sm rounded-lg border transition truncate flex items-center gap-2 ";
                        btn.className = baseClass + (isSelected ? "bg-blue-900/50 border-blue-500 text-blue-200" : "bg-gray-900 hover:bg-gray-700 border-gray-700 text-gray-300");
                        
                        btn.innerHTML = `<span>🖼️</span> <span class="truncate">${filename}</span>`;
                        btn.onclick = () => {
                            selectServerImage(filename);
                            // 리스트 재렌더링하여 하이라이트 업데이트
                            fetchImageList();
                        };
                        listContainer.appendChild(btn);
                    });
                })
                .catch(err => console.error("Failed to fetch image list:", err));
        }

        function setMode(mode) {
            fetch(`/set_mode/${mode}`, { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        currentMode = data.mode;
                        const label = document.getElementById('current-mode-label');
                        label.innerText = data.mode;
                        
                        if (data.mode === 'front') {
                            label.className = "font-bold text-blue-400 uppercase tracking-widest";
                        } else {
                            label.className = "font-bold text-purple-400 uppercase tracking-widest";
                        }
                        
                        // 이미 로드된 사진이 있다면 즉시 재분석
                        triggerAnalysis();
                    }
                })
                .catch(err => console.error('Mode switch failed:', err));
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            currentFile = file;
            currentServerFile = null; // 업로드 우선
            fetchImageList(); // 선택 해제 표시
            triggerAnalysis();
        }

        function selectServerImage(filename) {
            currentServerFile = filename;
            currentFile = null; // 서버 파일 우선
            triggerAnalysis();
        }

        function triggerAnalysis() {
            if (!currentFile && !currentServerFile) return;

            document.getElementById('result-image').classList.add('hidden');
            document.getElementById('placeholder-text').classList.add('hidden');
            document.getElementById('loading-spinner').classList.remove('hidden');

            let fetchPromise;

            if (currentFile) {
                const formData = new FormData();
                formData.append('file', currentFile);
                formData.append('mode', currentMode);

                fetchPromise = fetch('/analyze_image', {
                    method: 'POST',
                    body: formData
                });
            } else if (currentServerFile) {
                const formData = new FormData();
                formData.append('mode', currentMode);

                fetchPromise = fetch(`/analyze_server_image/${currentServerFile}`, {
                    method: 'POST',
                    body: formData
                });
            }

            fetchPromise
            .then(response => {
                if (!response.ok) throw new Error("분석 실패");
                return response.blob();
            })
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const img = document.getElementById('result-image');
                img.src = url;
                
                document.getElementById('loading-spinner').classList.add('hidden');
                img.classList.remove('hidden');
            })
            .catch(err => {
                document.getElementById('loading-spinner').classList.add('hidden');
                document.getElementById('placeholder-text').classList.remove('hidden');
                alert("이미지 처리 중 오류가 발생했습니다.");
                console.error(err);
            });
        }
    </script>
</body>
</html>
